<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SYNC_CHECK: 24/03/2026 16:40 -->
    <title>User Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="background-mesh">
        <div class="mesh-blob blob-1"></div>
        <div class="mesh-blob blob-2"></div>
    </div>
    
    <nav class="navbar glassmorphism">
        <div class="nav-content">
            <h1 class="logo">System Dashboard</h1>
            <div class="nav-actions">
                <div class="user-badge" id="nav-user-badge">Loading...</div>
                <button onclick="logout()" class="btn btn-secondary btn-sm">Log Out</button>
            </div>
        </div>
    </nav>

    <div class="container dashboard-container">
        
        <!-- PERSONAL SESSION -->
        <section class="card glassmorphism section-profile fade-in">
            <div class="section-header">
                <h2>Your Profile</h2>
                <div class="role-badge" id="profile-role">USER</div>
            </div>
            
            <div class="profile-details">
                <div class="detail-item">
                    <span class="detail-label">Username</span>
                    <span class="detail-value" id="profile-username">-</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Email</span>
                    <span class="detail-value" id="profile-email">-</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">User ID</span>
                    <span class="detail-value" id="profile-id">-</span>
                </div>
            </div>

            <!-- Expandable Assets Accordion -->
            <div class="accordion slide-up" style="margin-top: 2rem;" id="personal-assets-accordion">
                <div class="accordion-header glassmorphism" style="padding: 1rem; border-radius: 8px;" onclick="toggleAccordion('personal-assets-accordion')">
                    <strong>Manage Shared Assets</strong>
                </div>
                <div class="accordion-content">
                    <div class="header-actions" style="display: flex; gap: 1rem; margin-bottom: 1rem; align-items: center;">
                        <input type="file" id="doc-upload-input" accept=".pdf,.doc,.docx,image/*,video/*" style="display: none;">
                        <button onclick="document.getElementById('doc-upload-input').click()" class="btn btn-primary btn-sm">Upload File</button>
                        <button onclick="loadUserDocuments()" class="btn btn-secondary btn-sm">Refresh List</button>
                    </div>
                    <div id="doc-message" class="form-message"></div>
                    <div class="asset-tabs">
                        <button class="tab-btn active" data-tab="image">Imagens</button>
                        <button class="tab-btn" data-tab="video">Vídeos</button>
                        <button class="tab-btn" data-tab="pdf">PDF</button>
                        <button class="tab-btn" data-tab="word">Word</button>
                    </div>
                    <div id="personal-table-container">
                        <table class="data-table" style="margin-top: 1rem;">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Shared At</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="docs-table-body">
                                <tr>
                                    <td colspan="3" style="text-align: center; color: var(--text-muted);">No documents shared yet.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div id="personal-grid-container" class="assets-grid hidden" style="margin-top: 1rem;"></div>
            </div>
        </div>
    </div>

    <!-- Media Preview Modal -->
    <div id="media-preview-modal" class="modal hidden">
        <div class="modal-content glassmorphism" style="width: 100vw; height: 100vh; max-width: none; border-radius: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.9); border: none;">
            <div class="modal-header" style="position: absolute; top: 2rem; right: 2rem; border: none; width: auto;">
                <span class="close" onclick="closeMediaPreview()" style="font-size: 3rem; color: white; opacity: 0.8;">&times;</span>
            </div>
            <div id="preview-content" style="display: flex; justify-content: center; align-items: center; width: 90vw; height: 80vh; overflow: hidden; background: transparent; position: relative;">
                <!-- Media here -->
            </div>
            <button id="prev-preview" class="nav-arrow prev">&lsaquo;</button>
            <button id="next-preview" class="nav-arrow next">&rsaquo;</button>
            <div style="margin-top: 1.5rem; display: flex; justify-content: center;">
                <button id="btn-download-preview" class="btn btn-primary">
                    <i class="fas fa-download"></i> Download
                </button>
            </div>
        </div>
    </div>
        </section>

        <!-- USERS LIST SESSION (Master Only) -->
        <section class="card glassmorphism section-admin slide-up hidden" id="admin-panel">
            <div class="section-header">
                <div>
                    <h2>User Management</h2>
                    <p>Visualização de todos os usuários registrados no sistema.</p>
                </div>
                <button onclick="resetDatabase()" id="btn-reset-db" class="btn btn-secondary btn-sm hidden" style="color: var(--error); border-color: rgba(239, 68, 68, 0.3);">
                   Limpar Banco
                </button>
            </div>
            
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Created</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body">
                        <!-- Populated via JS -->
                    </tbody>
                </table>
            </div>
        </section>

    </div>

    </div>

    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadDashboard();
        });
    </script>
</body>
</html>
